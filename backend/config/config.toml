[server]
size_limit = 2048
request_timeout_secs = 60
max_concurrent_requests = 100
request_size_limit = 10

[server.pool]
idle_timeout_secs = 90
max_idle_per_host = 32
http2_stream_window_size = 2097152
http2_connection_window_size = 8388608

[shell]
editor = false
public_base_url = ""

[ingress]
auth_header_name = "x-gh-proxy-origin-auth"
auth_header_value = ""

[debug]
endpoints_enabled = false
metrics_enabled = false

[log]
level = "info"

[auth]
token = ""

[registry]
default = "registry-1.docker.io"
allowed_hosts = ["registry-1.docker.io"]
readiness_depends_on_registry = false

[proxy]
allowed_hosts = [
  "github.com",
  "*.github.com",
  "githubusercontent.com",
  "*.githubusercontent.com",
]

[cache]
strategy = "memory_with_cdn"
max_size_bytes = 536870912
default_ttl_secs = 3600
max_ttl_secs = 86400
min_object_size = 1024
max_object_size = 104857600
cacheable_patterns = [
  "/github/*",
  "/v2/*/blobs/*",
  "/v2/*/manifests/*",
]
bypass_patterns = [
  "/api/*",
  "/metrics",
  "/healthz",
  "/readyz",
]

[rate_limit]
window_secs = 60
max_requests = 100
